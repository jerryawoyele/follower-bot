# fly.toml app configuration file generated for follower-bot-e3nkpg on 2026-03-22T23:55:30Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'follower-bot-e3nkpg'
primary_region = 'fra'

[build]
[env]
  NODE_ENV = "production"

[processes]
  app = "npm run dev"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
